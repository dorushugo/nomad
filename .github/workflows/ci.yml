name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prisma client is consumed at typecheck time by api/src/utils/prisma.ts
      # so we need it generated before tsc runs.
      - name: Generate Prisma client
        run: npm run db:generate -w @nomad/api
        env:
          DATABASE_URL: postgres://placeholder
          DIRECT_URL: postgres://placeholder

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
        env:
          DATABASE_URL: postgres://placeholder
          DIRECT_URL: postgres://placeholder
          BETTER_AUTH_SECRET: placeholder
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
